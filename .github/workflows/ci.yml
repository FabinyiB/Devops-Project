name: CI with Cypress and Docker Deploy
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies and run Cypress
        run: |
          npm install
          npm start &
          server_pid=$!
          for i in {1..20}; do curl -s http://localhost:3000 && break || sleep 1; done
          npx cypress run --browser chrome
          kill $server_pid
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/hello-world-app:latest
            ${{ secrets.DOCKER_USERNAME }}/hello-world-app:${{ github.run_number }}
          context: .
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}